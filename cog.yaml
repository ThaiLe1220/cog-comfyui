predict: "predict.py:Predictor"

build:
  gpu: true
  cuda: "12.1"
  python_version: "3.12"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "libgomp1" 
    - "ffmpeg"
    - "wget"  # Add wget for complex downloads
  
  python_requirements: "requirements.txt"
  
  run:
    # Install pget for simple downloads
    - curl -o /usr/local/bin/pget -L "https://github.com/replicate/pget/releases/latest/download/pget_$(uname -s)_$(uname -m)" && chmod +x /usr/local/bin/pget
    
    # Install additional Python packages for ONNX and WAN2.2
    - pip install onnxruntime-gpu --extra-index-url https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/onnxruntime-cuda-12/pypi/simple/
    
    # Create all model directories with proper ownership
    - mkdir -p /src/ComfyUI/models/unet && chown -R root:root /src/ComfyUI/models/unet
    - mkdir -p /src/ComfyUI/models/loras && chown -R root:root /src/ComfyUI/models/loras
    - mkdir -p /src/ComfyUI/models/vae && chown -R root:root /src/ComfyUI/models/vae
    - mkdir -p /src/ComfyUI/models/text_encoders && chown -R root:root /src/ComfyUI/models/text_encoders
    - mkdir -p /src/ComfyUI/models/upscale_models && chown -R root:root /src/ComfyUI/models/upscale_models
    - mkdir -p /src/ComfyUI/models/animatediff_models && chown -R root:root /src/ComfyUI/models/animatediff_models
    - mkdir -p /src/ComfyUI/models/checkpoints && chown -R root:root /src/ComfyUI/models/checkpoints
    - mkdir -p /src/ComfyUI/models/clip && chown -R root:root /src/ComfyUI/models/clip
    - mkdir -p /src/ComfyUI/models/controlnet && chown -R root:root /src/ComfyUI/models/controlnet
    - mkdir -p /src/ComfyUI/models/diffusion_models && chown -R root:root /src/ComfyUI/models/diffusion_models
    
    # Download WAN2.2 GGUF models - Use wget for complex HuggingFace redirects
    - echo "🔄 Downloading GGUF models with wget (handles HF redirects properly)..."
    - wget --content-disposition --trust-server-names --timeout=3600 --tries=3 -O /src/ComfyUI/models/unet/Wan2.2-T2V-A14B-HighNoise-Q4_K_M.gguf "https://huggingface.co/QuantStack/Wan2.2-T2V-A14B-GGUF/resolve/main/HighNoise/Wan2.2-T2V-A14B-HighNoise-Q4_K_M.gguf"
    - wget --content-disposition --trust-server-names --timeout=3600 --tries=3 -O /src/ComfyUI/models/unet/Wan2.2-T2V-A14B-LowNoise-Q4_K_M.gguf "https://huggingface.co/QuantStack/Wan2.2-T2V-A14B-GGUF/resolve/main/LowNoise/Wan2.2-T2V-A14B-LowNoise-Q4_K_M.gguf"
    - echo "✅ GGUF models downloaded directly to /src/ComfyUI/models/unet/"
    
    # Download LoRA models directly to correct location
    - echo "🔄 Downloading LoRA models..."
    - pget "https://huggingface.co/Kijai/WanVideo_comfy/resolve/main/Lightx2v/lightx2v_T2V_14B_cfg_step_distill_v2_lora_rank64_bf16.safetensors" /src/ComfyUI/models/loras/lightx2v_T2V_14B_cfg_step_distill_v2_lora_rank64_bf16.safetensors
    - pget "https://huggingface.co/vrgamedevgirl84/Wan14BT2VFusioniX/resolve/main/FusionX_LoRa/Wan2.1_T2V_14B_FusionX_LoRA.safetensors" /src/ComfyUI/models/loras/Wan2.1_T2V_14B_FusionX_LoRA.safetensors
    - echo "✅ LoRA models downloaded to /src/ComfyUI/models/loras/"
    
    # Download VAE and text encoder (these already work)
    - echo "🔄 Downloading VAE and text encoder..."
    - pget "https://huggingface.co/Comfy-Org/Wan_2.1_ComfyUI_repackaged/resolve/main/split_files/vae/wan_2.1_vae.safetensors" /src/ComfyUI/models/vae/wan_2.1_vae.safetensors
    - pget "https://huggingface.co/Comfy-Org/Wan_2.1_ComfyUI_repackaged/resolve/main/split_files/text_encoders/umt5_xxl_fp8_e4m3fn_scaled.safetensors" /src/ComfyUI/models/text_encoders/umt5_xxl_fp8_e4m3fn_scaled.safetensors
    - echo "✅ VAE and text encoder downloaded"
    
    # Download upscaler directly to correct location  
    - echo "🔄 Downloading upscaler..."
    - pget "https://huggingface.co/ai-forever/Real-ESRGAN/resolve/a86fc6182b4650b4459cb1ddcb0a0d1ec86bf3b0/RealESRGAN_x2.pth" /src/ComfyUI/models/upscale_models/RealESRGAN_x2.pth
    - echo "✅ Upscaler downloaded to /src/ComfyUI/models/upscale_models/"
    
    # Install additional dependencies for WAN2.2 pipeline
    - pip install blend_modes alembic gguf>=0.13.0 protobuf
    
    # Fix websocket compatibility issues
    - pip uninstall -y websocket websocket-client websockets || true
    - pip install --no-cache-dir --force-reinstall websocket-client==1.8.0
    
    # Verify critical dependencies
    - echo "Testing websocket import..." && python -c "import websocket; print('✅ WebSocket imported successfully')"
    - echo "Testing safetensors import..." && python -c "import safetensors; print('✅ safetensors imported successfully')"
    
    # Final verification - check all models are in correct locations
    - echo "=== WAN2.2 Model Verification ==="
    - echo "GGUF Models:" && ls -la /src/ComfyUI/models/unet/*.gguf && echo "✅ GGUF models found"
    - echo "VAE Model:" && ls -la /src/ComfyUI/models/vae/wan_2.1_vae.safetensors && echo "✅ VAE model found" 
    - echo "LoRA Models:" && ls -la /src/ComfyUI/models/loras/ | grep -E "(lightx2v|FusionX)" && echo "✅ LoRA models found"
    - echo "Text Encoder:" && ls -la /src/ComfyUI/models/text_encoders/umt5* && echo "✅ Text encoder found"
    - echo "Upscaler:" && ls -la /src/ComfyUI/models/upscale_models/RealESRGAN* && echo "✅ Upscaler found"
    - echo "RIFE will be downloaded automatically by ComfyUI-Frame-Interpolation custom node on first use"
    - echo "=== Build Verification Complete ==="